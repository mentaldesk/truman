services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: truman
      POSTGRES_USER: ${POSTGRES_USER:-truman}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-truman}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No volumes — ephemeral DB, dies with the container

  jobrunner-migrate:
    image: ghcr.io/mentaldesk/truman-jobrunner:${IMAGE_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=truman;Username=${POSTGRES_USER:-truman};Password=${POSTGRES_PASSWORD}"
    command: ["--run-migrations"]
    restart: no

  jobrunner-seed:
    image: ghcr.io/mentaldesk/truman-jobrunner:${IMAGE_TAG:-latest}
    depends_on:
      jobrunner-migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=truman;Username=${POSTGRES_USER:-truman};Password=${POSTGRES_PASSWORD}"
    command: ["--fetch", "--analyse", "--limit", "10"]
    restart: no

  app:
    image: ghcr.io/mentaldesk/truman:${IMAGE_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
      jobrunner-seed:
        condition: service_completed_successfully
    ports:
      - "3000:8080"
    env_file:
      - .env
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=truman;Username=${POSTGRES_USER:-truman};Password=${POSTGRES_PASSWORD}"
      Authentication__Social__Enabled: "false"
