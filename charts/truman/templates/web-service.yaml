apiVersion: v1
kind: Service
metadata:
  name: {{ include "truman.fullname" . }}-web
  namespace: {{ .Values.namespace.name }}
  labels:
    component: web
    {{- include "truman.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.web.type }}
  selector:
    component: web
    {{- include "truman.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.web.port }}
      targetPort: {{ .Values.web.containerPort }}
      name: http

