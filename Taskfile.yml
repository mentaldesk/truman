version: '3'

tasks:
  # -----------------------------
  # Image & cluster prerequisites
  # -----------------------------
  kind-generate-config:
    desc: Generate kind-config.yaml from template
    cmds:
      - export POSTGRES_DATA_PATH=${PWD}/.kind-data && envsubst < k8s/kind-config.yaml.TEMPLATE > k8s/kind-config.yaml

  kind-create:
    desc: Create a local kind cluster using kind-config.yaml
    cmds:
      - |
        if [ ! -f k8s/kind-config.yaml ]; then
          echo "kind-config.yaml not found, generating from template..."
          export POSTGRES_DATA_PATH=${PWD}/.kind-data && envsubst < k8s/kind-config.yaml.TEMPLATE > k8s/kind-config.yaml
        fi
        kind create cluster --name truman --config k8s/kind-config.yaml

  kind-delete:
    desc: Delete the local kind cluster named 'truman'
    cmds:
      - kind delete cluster --name truman

  helm-ensure-namespace:
    desc: Ensure namespace exists and set it as current context namespace
    cmds:
      - kubectl get namespace truman >/dev/null 2>&1 || kubectl create namespace truman
      - kubectl config set-context --current --namespace=truman || echo "(Info) Unable to set current context namespace (no current context?)"

  helm-set-namespace:
    desc: Manually set the current kubectl context namespace to truman
    cmds:
      - kubectl config set-context --current --namespace=truman

  helm-create-secret:
    desc: Create/update secret from .env for Helm-managed release
    dotenv: ['.env']
    cmds:
      - kubectl delete secret truman-env -n truman --ignore-not-found
      - kubectl create secret generic truman-env --from-env-file=.env -n truman

  # Production secret from .env.production
  helm-create-secret-prod:
    desc: Create/update secret from .env.production for Helm-managed release
    dotenv: ['.env.production']
    cmds:
      - kubectl delete secret truman-env -n truman --ignore-not-found
      - kubectl create secret generic truman-env --from-env-file=.env.production -n truman

  build-images:
    desc: Build Docker images (api, jobrunner, web)
    dotenv: ['.env']
    cmds:
      - docker build --build-arg SENTRY_AUTH_TOKEN=$SENTRY_AUTH_TOKEN_TRUMAN -t truman-jobrunner:latest -f src/Truman.JobRunner/Dockerfile src
      - docker build --build-arg SENTRY_AUTH_TOKEN=$SENTRY_AUTH_TOKEN_TRUMAN -t truman-api:latest -f src/Truman.Api/Dockerfile src
      - docker build -t truman-web:latest -f src/web/Dockerfile src/web

  load-images:
    desc: Load locally built images into kind
    cmds:
      - kind load docker-image truman-jobrunner:latest --name truman
      - kind load docker-image truman-api:latest --name truman
      - kind load docker-image truman-web:latest --name truman

  build-and-load-images:
    desc: Build and load all images into kind
    deps: [build-images]
    cmds:
      - task: load-images

  # -----------------------------
  # Helm workflows
  # -----------------------------
  helm-template-dev:
    desc: Render Helm manifests (dev) to /tmp/truman.rendered.yaml for inspection
    cmds:
      - "helm template truman k8s/charts/truman -f k8s/charts/truman/values.yaml -f k8s/charts/truman/values.dev.yaml > /tmp/truman.rendered.yaml && echo 'Rendered: /tmp/truman.rendered.yaml'"

  helm-dev-deploy:
    desc: Build+load images, ensure secret, install/upgrade release (forces restart via timestamp)
    deps: [build-and-load-images, helm-create-secret, helm-ensure-namespace]
    cmds:
      - >-
          TS=$(date +%s) && helm upgrade --install truman k8s/charts/truman
          -n truman --create-namespace
          -f k8s/charts/truman/values.yaml -f k8s/charts/truman/values.dev.yaml
          --set image.api.repository=truman-api,image.api.tag=latest
          --set image.web.repository=truman-web,image.web.tag=latest
          --set image.jobrunner.repository=truman-jobrunner,image.jobrunner.tag=latest
          --set api.extraEnv[0].name=FORCE_REDEPLOY --set api.extraEnv[0].value=$TS
          --set web.extraEnv[0].name=FORCE_REDEPLOY --set web.extraEnv[0].value=$TS
          --wait --timeout 180s

  helm-dev-uninstall:
    desc: Uninstall Helm release (namespace & PVCs retained)
    cmds:
      - helm uninstall truman -n truman || true

  helm-dev-reset:
    desc: Uninstall release and remove leftover postgres & PVC artifacts (DANGER)
    cmds:
      - helm uninstall truman -n truman || true
      - kubectl delete deployment truman-postgres -n truman --ignore-not-found
      - kubectl delete service truman-postgres -n truman --ignore-not-found
      - kubectl delete pvc truman-postgres-pvc -n truman --ignore-not-found
      - kubectl delete pv truman-postgres-pv --ignore-not-found || true
      - kubectl delete job -n truman -l component=migrations --ignore-not-found || true
      - echo "Reset complete. Run 'task helm-dev-deploy' to redeploy."

  helm-port-forward:
    desc: Port-forward API (5001) & Web (3000) & Postgres (5432) to localhost
    cmds:
      - bash -c 'if [ -f /tmp/pf-truman-api.pid ] && kill -0 $(cat /tmp/pf-truman-api.pid) 2>/dev/null; then kill "$(cat /tmp/pf-truman-api.pid)" || true; fi; nohup kubectl port-forward -n truman svc/truman-api 5001:5001 --address 127.0.0.1 >/tmp/pf-truman-api.log 2>&1 & echo $! > /tmp/pf-truman-api.pid'
      - bash -c 'if [ -f /tmp/pf-truman-web.pid ] && kill -0 $(cat /tmp/pf-truman-web.pid) 2>/dev/null; then kill "$(cat /tmp/pf-truman-web.pid)" || true; fi; nohup kubectl port-forward -n truman svc/truman-web 3000:80 --address 127.0.0.1 >/tmp/pf-truman-web.log 2>&1 & echo $! > /tmp/pf-truman-web.pid'
      - bash -c 'if [ -f /tmp/pf-truman-postgres.pid ] && kill -0 $(cat /tmp/pf-truman-postgres.pid) 2>/dev/null; then kill "$(cat /tmp/pf-truman-postgres.pid)" || true; fi; nohup kubectl port-forward -n truman svc/truman-postgres 5432:5432 --address 127.0.0.1 >/tmp/pf-truman-postgres.log 2>&1 & echo $! > /tmp/pf-truman-postgres.pid'
      - echo "DB exposed on port 5432"
      - echo "Web exposed on port 3000"
      - echo "API exposed on port 5001"

  # -----------------------------
  # Production Helm workflows (Civo)
  # -----------------------------
  helm-template-prod:
    desc: Render Helm manifests (prod) to /tmp/truman.prod.yaml for inspection
    cmds:
      - "helm template truman k8s/charts/truman -f k8s/charts/truman/values.yaml -f k8s/charts/truman/values.prod.yaml > /tmp/truman.prod.yaml && echo 'Rendered: /tmp/truman.prod.yaml'"

  helm-prod-deploy:
    desc: Ensure namespace, create Secret from .env.production, and install/upgrade production release
    deps: [helm-ensure-namespace, helm-create-secret-prod]
    cmds:
      - >-
          helm upgrade --install truman k8s/charts/truman
          -n truman --create-namespace
          -f k8s/charts/truman/values.yaml -f k8s/charts/truman/values.prod.yaml
          --wait --timeout 300s
