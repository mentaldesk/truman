version: '3'

tasks:
  kind-generate-config:
    desc: Generate kind-config.yaml from template
    cmds:
      - export POSTGRES_DATA_PATH=${PWD}/.kind-data && envsubst < k8s/kind-config.yaml.TEMPLATE > k8s/kind-config.yaml

  kind-create:
    desc: Create a local kind cluster using kind-config.yaml
    cmds:
      - |
        if [ ! -f k8s/kind-config.yaml ]; then
          echo "kind-config.yaml not found, generating from template..."
          export POSTGRES_DATA_PATH=${PWD}/.kind-data && envsubst < k8s/kind-config.yaml.TEMPLATE > k8s/kind-config.yaml
        fi
        kind create cluster --name truman --config k8s/kind-config.yaml

  kind-delete:
    desc: Delete the local kind cluster named 'truman'
    cmds:
      - kind delete cluster --name truman 

  k8s-create-namespace:
    desc: Create the truman namespace
    cmds:
      - kubectl apply -f k8s/namespace.yaml

  k8s-set-default-namespace:
    desc: Create the truman namespace
    cmds:
      - kubectl config set-context --current --namespace=truman

  k8s-build-and-load-images:
    desc: Build Docker images and load them into the kind cluster
    deps: [k8s-create-secret]
    dotenv: ['.env']
    cmds:
      - docker build --build-arg SENTRY_AUTH_TOKEN=$SENTRY_AUTH_TOKEN_TRUMAN -t truman-jobrunner:latest -f src/Truman.JobRunner/Dockerfile src
      - docker build --build-arg SENTRY_AUTH_TOKEN=$SENTRY_AUTH_TOKEN_TRUMAN -t truman-api:latest -f src/Truman.Api/Dockerfile src
      - docker build -t truman-web:latest -f src/web/Dockerfile src/web
      - kind load docker-image truman-jobrunner:latest --name truman
      - kind load docker-image truman-api:latest --name truman
      - kind load docker-image truman-web:latest --name truman

  k8s-create-secret:
    desc: Create and apply k8s secret from .env for the truman namespace
    cmds:
      - kubectl delete secret truman-env --namespace=truman --ignore-not-found
      - kubectl create secret generic truman-env --from-env-file=.env --namespace=truman

  k8s-create-configmap-dev:
    desc: Create and apply k8s ConfigMap for development configuration
    cmds:
      - kubectl apply -f k8s/configmap-dev.yaml

  k8s-apply:
    desc: Apply all k8s manifests for the truman namespace
    cmds:
      - kubectl apply -f k8s/postgres/
      - kubectl apply -f k8s/api/
      - kubectl apply -f k8s/web/
      - kubectl apply -f k8s/jobrunner/cronjob.yaml

  k8s-rollout-restart:
    desc: Rollout restart all k8s manifests for the truman namespace
    cmds:
      - kubectl rollout restart deployment/web -n truman
      - kubectl rollout restart deployment/api -n truman
      - kubectl delete cronjob jobrunner -n truman
      - kubectl apply -f k8s/jobrunner/cronjob.yaml

  k8s-dev-up:
    desc: Start the development environment
    cmds:
      - task k8s-create-namespace
      - task k8s-set-default-namespace
      - task k8s-create-configmap-dev
      - task k8s-create-secret
      - task k8s-build-and-load-images
      - task k8s-apply

  # k8s-port-forward:
  #   desc: Port forward web (to 3000) and api (to 5001) services to localhost
  #   cmds:
  #     - kubectl port-forward svc/truman-postgres 5432:5432 &
  #     - kubectl port-forward svc/truman-api 5001:5001 -n truman &
  #     - kubectl port-forward svc/truman-web 3000:80 -n truman &

  k8s-delete:
    desc: Delete all k8s manifests for the truman namespace
    cmds:
      - kubectl delete -f k8s/jobrunner/cronjob.yaml --ignore-not-found
      - kubectl delete -f k8s/web/ --ignore-not-found
      - kubectl delete -f k8s/api/ --ignore-not-found
      - kubectl delete -f k8s/postgres/ --ignore-not-found
      - kubectl delete -f k8s/configmap-dev.yaml --ignore-not-found
      - kubectl delete -f k8s/namespace.yaml --ignore-not-found

  helm-template-dev:
    desc: Render Helm manifests (dev) to stdout for inspection
    cmds:
      - "helm template truman charts/truman -f charts/truman/values.yaml -f charts/truman/values.dev.yaml > /tmp/truman.rendered.yaml && echo 'Rendered: /tmp/truman.rendered.yaml'"

  helm-dev-deploy:
    desc: Build & load images, create/update secret, then helm upgrade --install (forces restart via dummy env var)
    deps: [k8s-build-and-load-images]
    cmds:
      - kubectl delete configmap truman-config -n truman --ignore-not-found
      - TS=$(date +%s) && helm upgrade --install truman ./charts/truman --namespace truman --create-namespace -f charts/truman/values.yaml -f charts/truman/values.dev.yaml --set image.api.repository=truman-api,image.api.tag=latest --set image.web.repository=truman-web,image.web.tag=latest --set image.jobrunner.repository=truman-jobrunner,image.jobrunner.tag=latest --set api.extraEnv[0].name=FORCE_REDEPLOY --set api.extraEnv[0].value=$TS --set web.extraEnv[0].name=FORCE_REDEPLOY --set web.extraEnv[0].value=$TS --wait --timeout 180s

  helm-dev-uninstall:
    desc: Uninstall the Helm release (keeps namespace & PVCs unless manually removed)
    cmds:
      - helm uninstall truman -n truman || true
